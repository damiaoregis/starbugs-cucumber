{"source":{"uri":"features/catalogo.feature","data":"#language: pt\n\nFuncionalidade: Catálogo de cafés\n    Como um usuário do site, eu quero acessar o catálogo de cafés na página principal\n    Para que eu possa escolher e saber mais sobre os produtos disponíveis.\n\nCenário: Acessar o catálogo de cafés na página principal\n    Quando eu acessar a página principal da Starbugs\n    Então eu devo ver uma lista de cafés disponíveis\n\nCenário: Iniciar o processo de compra de um café\n    Dado que eu estou na página principal da Starbugs\n    E que desejo comprar o seguinte produto:\n      | name     | Expresso Gelado |         \n      | price    | R$ 9,99         |\n      | delivery | R$ 10,00        |\n    Quando inicio a compra desse item\n    Então devo ver a página de checkout com detalhes do produto\n    E o valor total da compra deve ser \"R$ 19,99\"\n\nCenário: Café indisponível\n    Dado que eu estou na página principal da Starbugs\n     E que desejo comprar o seguinte produto:\n      | name     | Expresso Cremoso |\n    Quando inicio a compra desse item\n    Então devo ver um popup indicando que o produto está indisponível","mediaType":"text/x.cucumber.gherkin+plain"}},
{"source":{"uri":"features/cupom.feature","data":"#language: pt\n\nFuncionalidade: Cupons\n    Como um usuário do site Starbugs, eu quero poder aplicar cupons de desconto na página de checkout \n    Para que eu possa obter reduções no preço de produtos, aumentando a satisfação com minha experiência de compra.\n      \n    Contexto:    \n        Dado que iniciei o processo de compra do item:\n            | name     | Café com Leite |         \n            | price    | R$ 19,99       |\n            | delivery | R$ 10,00       | \n            | total    | R$ 29,99       |\n\n    Cenário: Aplicar desconto de 20% \n\n        Quando aplico o seguinte cupom: \"MEUCAFE\"\n        Então o valor total da compra deve ser atualizado para \"R$ 25,99\"\n\n    Cenário: Cupom Expirado\n\n        Quando aplico o seguinte cupom: \"PROMO20\"\n        Então devo ver a seguinte notificação: \"Cupom expirado!\"\n            E o valor total da compra deve permanecer o mesmo\n\n    Cenário: Cupom Inválido\n  \n        Quando aplico o seguinte cupom: \"PROMO100\"\n        Então devo ver a seguinte notificação: \"Cupom inválido!\"\n            E o valor total da compra deve permanecer o mesmo","mediaType":"text/x.cucumber.gherkin+plain"}},
{"source":{"uri":"features/pedido.feature","data":"#language: pt\n\nFuncionalidade: Pedidos\n    Como um usuário do site Starbugs, eu quero selecionar e comprar cafés \n    Para que eu possa receber os produtos em meu endereço e efetuar o pagamento na entrega.\n    @smoke\n     Cenário: Iniciar o processo de compra de um café\n\n        Dado que eu estou na página principal da Starbugs\n           E que desejo comprar o seguinte produto:\n            | name     | Expresso Tradicional |         \n            | price    | R$ 9,99              |\n            | delivery | R$ 10,00             |\n        Quando inicio a compra desse item\n        Então devo ver a página de checkout com detalhes do produto\n           E o valor total da compra deve ser \"R$ 19,99\"\n\n     Cenário: Café indisponível\n\n        Dado que eu estou na página principal da Starbugs\n           E que desejo comprar o seguinte produto:\n            | name     | Expresso Cremoso |\n        Quando inicio a compra desse item\n        Então devo ver um popup indicando que o produto está indisponível\n    Cenário: Compra bem sucedida \n\n        Dado que eu estou na página principal da Starbugs\n           E que iniciei a compra do item \"Expresso Tradicional\"\n        Quando faço a busca do CEP: \"04534011\"\n           E informo os demais dados do endereço:\n            | Numero      | 1000   |\n            | Complemento | Apto 22| \n        E escolho a forma de pagamento \"Cartão de Crédito\"\n        E por fim finalizo a compra\n        Então sou redirecionado para a página de confirmação do pedido\n           E deve ser informado um prazo de entrega estimado de \"20 min - 60 min\" ","mediaType":"text/x.cucumber.gherkin+plain"}},
